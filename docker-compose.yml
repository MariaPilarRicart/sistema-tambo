services:
  postgres:
    image: postgres:16
    container_name: tampo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tampo_db
      POSTGRES_USER: tampo_user
      POSTGRES_PASSWORD: tampo_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
